{% extends "base.html" %}
{% block title %}Connexion{% endblock %}

{% block content %}
<h1>Connexion</h1>

<form class="stacked" method="post" action="{{ url_for('main.login') }}">
  <label for="email">Email</label>
  <input type="email" id="email" name="email" required maxlength="120" autocomplete="email">

  <label for="mot_de_passe">Mot de passe</label>
  <input type="password" id="mot_de_passe" name="mot_de_passe" required autocomplete="current-password">

  <p style="margin-top:1rem;">
    <button type="submit">Se connecter</button>
  </p>
</form>

<p>Pas encore de compte ? <a href="{{ url_for('main.register') }}">Créer un compte</a>.</p>
{% endblock %}
