  <text x="455" y="305" class="table-text" text-anchor="middle">14</text>
  <rect x="500" y="293" width="40" height="18" class="badge" fill="#2E75B6"/>
  <text x="520" y="306" class="badge-text">user</text>
  <text x="590" y="305" class="table-text" fill="#2E75B6">👁️ ✏️ 🗑️</text>

