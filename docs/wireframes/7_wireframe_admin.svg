  <rect x="500" y="398" width="40" height="18" class="badge" fill="#2E75B6"/>
  <text x="520" y="411" class="badge-text">user</text>
  <text x="590" y="410" class="table-text" fill="#2E75B6">👁️ ✏️ 🗑️</text>

  <!-- Pagination -->
  <text x="320" y="455" class="body">← 1 2 3 →</text>

  <!-- Footer -->
  <rect x="30" y="545" width="640" height="40" class="footer-bg"/>
  <text x="350" y="570" class="footer-text">Poids Mort Numérique — Poids de la page : ~14 Ko</text>
