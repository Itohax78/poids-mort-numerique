  <text x="190" y="273" class="table-header-text">Email</text>
  <text x="350" y="273" class="table-header-text">Inscrit le</text>
  <text x="440" y="273" class="table-header-text">Services</text>
  <text x="510" y="273" class="table-header-text">Rôle</text>
