  <text x="380" y="66" class="nav-text">Tableau de bord</text>
  <text x="490" y="66" class="nav-text" font-weight="bold">Admin</text>
  <text x="560" y="66" class="nav-text">Mon profil</text>
  <text x="635" y="66" class="nav-text">↪</text>

  <text x="55" y="115" class="h1">Administration</text>

  <!-- Stats cards -->
  <rect x="55" y="135" width="140" height="70" class="card"/>
  <text x="125" y="170" class="stat-num">42</text>
  <text x="125" y="190" class="stat-label">Utilisateurs</text>

  <rect x="210" y="135" width="140" height="70" class="card"/>
  <text x="280" y="170" class="stat-num">318</text>
  <text x="280" y="190" class="stat-label">Services totaux</text>

  <rect x="365" y="135" width="140" height="70" class="card"/>
