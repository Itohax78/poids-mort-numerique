  <text x="520" y="341" class="badge-text">user</text>
  <text x="590" y="340" class="table-text" fill="#2E75B6">👁️ ✏️ 🗑️</text>

  <!-- Row 3 -->
  <rect x="55" y="353" width="590" height="35" class="table-row"/>
  <text x="70" y="375" class="table-text">charlie_dev</text>
  <text x="190" y="375" class="table-text">charlie@mail.com</text>
  <text x="350" y="375" class="table-text">15/01/2026</text>
  <text x="455" y="375" class="table-text" text-anchor="middle">22</text>
  <rect x="500" y="363" width="45" height="18" class="badge" fill="#C0392B"/>
  <text x="522" y="376" class="badge-text">admin</text>
  <text x="590" y="375" class="table-text" fill="#2E75B6">👁️ ✏️ 🗑️</text>

  <!-- Row 4 -->
  <rect x="55" y="388" width="590" height="35" class="table-row-alt"/>
  <text x="70" y="410" class="table-text">dana_eco</text>
