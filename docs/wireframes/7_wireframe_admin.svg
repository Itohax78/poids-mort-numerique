<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" font-family="Arial, sans-serif">
  <defs>
    <style>
      .frame { fill: #FFF; stroke: #CCC; stroke-width: 2; }
      .header-bg { fill: #1B4F72; }
      .nav-text { font-size: 13px; fill: #FFF; }
      .h1 { font-size: 20px; fill: #1B4F72; font-weight: bold; }
      .h2 { font-size: 15px; fill: #2E75B6; font-weight: bold; }
      .body { font-size: 12px; fill: #555; }
      .card { fill: #F8FBFE; stroke: #D6EAF8; stroke-width: 1.5; rx: 8; }
      .wireframe-label { font-size: 18px; fill: #1B4F72; font-weight: bold; text-anchor: middle; }
      .stat-num { font-size: 26px; fill: #1B4F72; font-weight: bold; text-anchor: middle; }
      .stat-label { font-size: 11px; fill: #888; text-anchor: middle; }
      .table-header { fill: #1B4F72; rx: 4; }
      .table-header-text { font-size: 11px; fill: #FFF; font-weight: bold; }
      .table-row { fill: #F8FBFE; stroke: #E8E8E8; stroke-width: 0.5; }
      .table-row-alt { fill: #FFF; stroke: #E8E8E8; stroke-width: 0.5; }
      .table-text { font-size: 11px; fill: #333; }
      .footer-bg { fill: #F4F6F6; }
      .footer-text { font-size: 10px; fill: #999; text-anchor: middle; }
      .badge { rx: 8; }
      .badge-text { font-size: 9px; fill: #FFF; text-anchor: middle; font-weight: bold; }
    </style>
  </defs>

  <text x="350" y="20" class="wireframe-label">Wireframe — Gestion des utilisateurs (Admin)</text>

  <rect x="30" y="35" width="640" height="550" class="frame"/>

  <!-- Header -->
  <rect x="30" y="35" width="640" height="50" class="header-bg"/>
