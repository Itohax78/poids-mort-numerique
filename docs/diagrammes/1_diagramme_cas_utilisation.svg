<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 640" font-family="'Segoe UI', sans-serif">
  <defs>
    <style>
      .title { font-size: 19px; font-weight: bold; fill: #2c3e50; }
      .actor-label { font-size: 13px; fill: #2c3e50; text-anchor: middle; }
      .uc-text { font-size: 11.5px; fill: #2c3e50; text-anchor: middle; }
      .system-label { font-size: 13px; fill: #555; text-anchor: middle; font-style: italic; }
    </style>
    <filter id="sketch" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <text x="440" y="30" class="title" text-anchor="middle">Diagramme de cas d'utilisation — Poids Mort Numérique</text>

  <!-- System boundary -->
  <path d="M 195 48 Q 197 46, 695 49 Q 698 50, 696 598 Q 694 601, 196 599 Q 193 597, 195 48" 
        fill="none" stroke="#888" stroke-width="1.8" stroke-dasharray="10,5" filter="url(#sketch)"/>
  <text x="445" y="72" class="system-label">Système — Poids Mort Numérique</text>

  <!-- ═══ ACTEURS ═══ -->
  <!-- Visiteur -->
  <g filter="url(#sketch)">
    <circle cx="75" cy="155" r="14" fill="none" stroke="#2c3e50" stroke-width="2"/>
    <line x1="75" y1="169" x2="75" y2="212" stroke="#2c3e50" stroke-width="2"/>
    <line x1="75" y1="212" x2="56" y2="248" stroke="#2c3e50" stroke-width="2"/>
    <line x1="75" y1="212" x2="94" y2="248" stroke="#2c3e50" stroke-width="2"/>
    <line x1="50" y1="188" x2="100" y2="188" stroke="#2c3e50" stroke-width="2"/>
  </g>
  <text x="75" y="270" class="actor-label">Visiteur</text>

  <!-- Utilisateur -->
  <g filter="url(#sketch)">
    <circle cx="75" cy="390" r="14" fill="none" stroke="#2c3e50" stroke-width="2"/>
    <line x1="75" y1="404" x2="75" y2="447" stroke="#2c3e50" stroke-width="2"/>
    <line x1="75" y1="447" x2="56" y2="483" stroke="#2c3e50" stroke-width="2"/>
    <line x1="75" y1="447" x2="94" y2="483" stroke="#2c3e50" stroke-width="2"/>
    <line x1="50" y1="423" x2="100" y2="423" stroke="#2c3e50" stroke-width="2"/>
  </g>
  <text x="75" y="505" class="actor-label">Utilisateur</text>

  <!-- Admin -->
  <g filter="url(#sketch)">
    <circle cx="820" cy="340" r="14" fill="none" stroke="#2c3e50" stroke-width="2"/>
    <line x1="820" y1="354" x2="820" y2="397" stroke="#2c3e50" stroke-width="2"/>
    <line x1="820" y1="397" x2="801" y2="433" stroke="#2c3e50" stroke-width="2"/>
    <line x1="820" y1="397" x2="839" y2="433" stroke="#2c3e50" stroke-width="2"/>
    <line x1="795" y1="373" x2="845" y2="373" stroke="#2c3e50" stroke-width="2"/>
  </g>
  <text x="820" y="455" class="actor-label">Admin</text>

  <!-- ═══ USE CASES ═══ -->
  <ellipse cx="400" cy="105" rx="128" ry="22" fill="#eaf2f8" stroke="#5b8db8" stroke-width="1.6" filter="url(#sketch)"/>
  <text x="400" y="110" class="uc-text">Consulter la page d'accueil</text>

  <ellipse cx="400" cy="165" rx="110" ry="22" fill="#eaf2f8" stroke="#5b8db8" stroke-width="1.6" filter="url(#sketch)"/>
  <text x="400" y="170" class="uc-text">Créer un compte</text>

  <ellipse cx="380" cy="230" rx="135" ry="22" fill="#eaf2f8" stroke="#5b8db8" stroke-width="1.6" filter="url(#sketch)"/>
  <text x="380" y="235" class="uc-text">Se connecter / Se déconnecter</text>

  <ellipse cx="380" cy="295" rx="118" ry="22" fill="#eaf2f8" stroke="#5b8db8" stroke-width="1.6" filter="url(#sketch)"/>
  <text x="380" y="300" class="uc-text">Gérer son profil (CRUD)</text>

  <ellipse cx="380" cy="360" rx="135" ry="22" fill="#eaf2f8" stroke="#5b8db8" stroke-width="1.6" filter="url(#sketch)"/>
  <text x="380" y="365" class="uc-text">Gérer ses services numériques</text>

  <ellipse cx="380" cy="425" rx="140" ry="22" fill="#eaf2f8" stroke="#5b8db8" stroke-width="1.6" filter="url(#sketch)"/>
  <text x="380" y="430" class="uc-text">Changer le statut d'un service</text>

  <ellipse cx="380" cy="490" rx="140" ry="22" fill="#eaf2f8" stroke="#5b8db8" stroke-width="1.6" filter="url(#sketch)"/>
  <text x="380" y="495" class="uc-text">Consulter son score de sobriété</text>

  <ellipse cx="380" cy="555" rx="135" ry="22" fill="#eaf2f8" stroke="#5b8db8" stroke-width="1.6" filter="url(#sketch)"/>
  <text x="380" y="560" class="uc-text">Consulter son tableau de bord</text>

  <ellipse cx="640" cy="320" rx="120" ry="22" fill="#eaf2f8" stroke="#5b8db8" stroke-width="1.6" filter="url(#sketch)"/>
  <text x="640" y="325" class="uc-text">Voir les statistiques globales</text>

  <ellipse cx="640" cy="385" rx="120" ry="22" fill="#eaf2f8" stroke="#5b8db8" stroke-width="1.6" filter="url(#sketch)"/>
  <text x="640" y="390" class="uc-text">Gérer tous les utilisateurs</text>

  <!-- ═══ LIENS (du bord acteur → bord ellipse, jamais par-dessus le texte) ═══ -->
  
  <!-- Visiteur → UC1 accueil -->
  <line x1="100" y1="170" x2="272" y2="105" stroke="#777" stroke-width="1.3" filter="url(#sketch)"/>
  <!-- Visiteur → UC2 compte -->
  <line x1="100" y1="195" x2="290" y2="165" stroke="#777" stroke-width="1.3" filter="url(#sketch)"/>

  <!-- Utilisateur → toutes ses UC (lignes partent du côté droit du bonhomme vers le bord gauche des ellipses) -->
  <line x1="100" y1="398" x2="245" y2="232" stroke="#777" stroke-width="1.3" filter="url(#sketch)"/>
  <line x1="100" y1="408" x2="262" y2="297" stroke="#777" stroke-width="1.3" filter="url(#sketch)"/>
  <line x1="100" y1="418" x2="245" y2="360" stroke="#777" stroke-width="1.3" filter="url(#sketch)"/>
  <line x1="100" y1="430" x2="240" y2="425" stroke="#777" stroke-width="1.3" filter="url(#sketch)"/>
  <line x1="100" y1="445" x2="240" y2="488" stroke="#777" stroke-width="1.3" filter="url(#sketch)"/>
  <line x1="100" y1="458" x2="245" y2="552" stroke="#777" stroke-width="1.3" filter="url(#sketch)"/>

  <!-- Admin → UC9 stats (bord gauche ellipse) -->
  <line x1="795" y1="348" x2="760" y2="322" stroke="#777" stroke-width="1.3" filter="url(#sketch)"/>
  <!-- Admin → UC10 gérer users -->
  <line x1="795" y1="372" x2="760" y2="385" stroke="#777" stroke-width="1.3" filter="url(#sketch)"/>

  <!-- Admin hérite des UC utilisateur (pointillés, vers bord droit des ellipses) -->
  <line x1="795" y1="352" x2="498" y2="296" stroke="#aaa" stroke-width="1.1" stroke-dasharray="6,4" filter="url(#sketch)"/>
  <line x1="795" y1="358" x2="515" y2="360" stroke="#aaa" stroke-width="1.1" stroke-dasharray="6,4" filter="url(#sketch)"/>
  <line x1="795" y1="368" x2="520" y2="425" stroke="#aaa" stroke-width="1.1" stroke-dasharray="6,4" filter="url(#sketch)"/>
  <line x1="795" y1="378" x2="520" y2="490" stroke="#aaa" stroke-width="1.1" stroke-dasharray="6,4" filter="url(#sketch)"/>
  <line x1="795" y1="385" x2="515" y2="553" stroke="#aaa" stroke-width="1.1" stroke-dasharray="6,4" filter="url(#sketch)"/>
</svg>
