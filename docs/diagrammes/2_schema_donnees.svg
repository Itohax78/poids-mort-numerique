<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 20px; font-weight: bold; fill: #1B4F72; }
      .class-header { fill: #1B4F72; rx: 6; ry: 6; }
      .class-body { fill: #F8FBFE; stroke: #2E75B6; stroke-width: 1.5; }
      .class-title { font-size: 15px; font-weight: bold; fill: white; text-anchor: middle; }
      .attr { font-size: 12px; fill: #333; }
      .pk { font-size: 12px; fill: #C0392B; font-weight: bold; }
      .fk { font-size: 12px; fill: #2E75B6; font-style: italic; }
      .relation { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .rel-label { font-size: 11px; fill: #666; text-anchor: middle; font-style: italic; }
      .card { font-size: 13px; fill: #C0392B; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="430" y="30" class="title" text-anchor="middle">Schéma conceptuel des données — Poids Mort Numérique</text>

  <!-- ═══ Utilisateur ═══ -->
  <rect x="30" y="60" width="250" height="36" rx="6" class="class-header"/>
  <rect x="30" y="96" width="250" height="170" class="class-body"/>
  <text x="155" y="84" class="class-title">Utilisateur</text>
  <text x="42" y="118" class="pk">PK  id : INTEGER</text>
  <text x="42" y="138" class="attr">pseudo : VARCHAR(50)</text>
  <text x="42" y="158" class="attr">email : VARCHAR(120) UNIQUE</text>
  <text x="42" y="178" class="attr">mot_de_passe_hashé : VARCHAR(255)</text>
  <text x="42" y="198" class="attr">rôle : ENUM('utilisateur','admin')</text>
  <text x="42" y="218" class="attr">date_inscription : DATE</text>
  <line x1="30" y1="230" x2="280" y2="230" stroke="#2E75B6" stroke-width="1"/>
  <text x="42" y="252" class="attr" font-style="italic">get_score() : float</text>

  <!-- ═══ ServiceNumérique ═══ -->
  <rect x="370" y="60" width="260" height="36" rx="6" class="class-header"/>
  <rect x="370" y="96" width="260" height="200" class="class-body"/>
  <text x="500" y="84" class="class-title">ServiceNumérique</text>
  <text x="382" y="118" class="pk">PK  id : INTEGER</text>
  <text x="382" y="138" class="attr">nom : VARCHAR(100)</text>
  <text x="382" y="158" class="attr">statut : ENUM('actif','dormant','supprimé')</text>
  <text x="382" y="178" class="attr">date_ajout : DATE</text>
  <text x="382" y="198" class="attr">date_derniere_utilisation : DATE</text>
  <text x="382" y="218" class="fk">FK  id_utilisateur : INTEGER</text>
  <text x="382" y="238" class="fk">FK  id_categorie : INTEGER</text>
  <line x1="370" y1="252" x2="630" y2="252" stroke="#2E75B6" stroke-width="1"/>
  <text x="382" y="275" class="attr" font-style="italic">changer_statut(new) : void</text>

  <!-- ═══ Catégorie ═══ -->
  <rect x="640" y="200" width="200" height="36" rx="6" class="class-header"/>
  <rect x="640" y="236" width="200" height="110" class="class-body"/>
  <text x="740" y="224" class="class-title">Catégorie</text>
  <text x="652" y="258" class="pk">PK  id : INTEGER</text>
  <text x="652" y="278" class="attr">nom : VARCHAR(50)</text>
  <text x="652" y="298" class="attr">impact_estime_kwh_an : FLOAT</text>
  <line x1="640" y1="310" x2="840" y2="310" stroke="#2E75B6" stroke-width="1"/>
  <text x="652" y="332" class="attr" font-style="italic">nb_services() : int</text>

  <!-- ═══ Relations ═══ -->
  <!-- Utilisateur 1 —— N ServiceNumérique -->
  <line x1="280" y1="160" x2="370" y2="160" stroke="#555" stroke-width="2"/>
  <text x="290" y="152" class="card">1</text>
  <text x="358" y="152" class="card">*</text>
  <text x="325" y="145" class="rel-label">possède</text>

  <!-- ServiceNumérique N —— 1 Catégorie -->
  <line x1="630" y1="238" x2="640" y2="270" stroke="#555" stroke-width="2"/>
  <text x="623" y="234" class="card">*</text>
  <text x="643" y="268" class="card">1</text>
  <text x="665" y="195" class="rel-label">appartient à</text>
</svg>